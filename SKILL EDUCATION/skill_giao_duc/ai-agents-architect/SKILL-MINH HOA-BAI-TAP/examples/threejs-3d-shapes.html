<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Khối đa diện 3D - Three.js</title>
    <style>
        * { margin: 0; padding: 0; }
        body { background: #0f172a; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        canvas { display: block; }
        #info {
            position: absolute; top: 20px; left: 20px;
            color: #e2e8f0;
            background: rgba(15,23,42,0.9); padding: 20px 24px;
            border-radius: 14px; border: 1px solid #334155;
            max-width: 320px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        #info h2 { color: #38bdf8; font-size: 1.2rem; margin-bottom: 8px; }
        #info p { color: #94a3b8; font-size: 0.88rem; line-height: 1.6; }
        #info .stat { display: flex; justify-content: space-between; margin: 4px 0; }
        #info .stat .label { color: #64748b; }
        #info .stat .value { color: #38bdf8; font-weight: 600; font-family: monospace; }
        #info .highlight { color: #f59e0b; }
        #controls {
            position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 10px;
        }
        #controls button {
            padding: 10px 20px; border: 1px solid #334155; border-radius: 10px;
            background: #1e293b; color: #e2e8f0; cursor: pointer;
            font-size: 0.9rem; transition: all 0.2s;
        }
        #controls button:hover { background: #334155; border-color: #38bdf8; }
        #controls button.active { background: #38bdf820; border-color: #38bdf8; color: #38bdf8; }
    </style>
</head>
<body>
    <div id="info">
        <h2>🎲 Hình hộp chữ nhật</h2>
        <p>ABCD.A'B'C'D' với a = 4, b = 3, c = 5</p>
        <div class="stat"><span class="label">Cạnh đáy a</span><span class="value">4</span></div>
        <div class="stat"><span class="label">Cạnh đáy b</span><span class="value">3</span></div>
        <div class="stat"><span class="label">Chiều cao c</span><span class="value">5</span></div>
        <div class="stat"><span class="label">Đường chéo AC'</span><span class="value highlight" id="diag-val">—</span></div>
        <div class="stat"><span class="label">Thể tích</span><span class="value highlight" id="vol-val">—</span></div>
        <div class="stat"><span class="label">Diện tích toàn phần</span><span class="value" id="area-val">—</span></div>
        <p style="margin-top: 12px; font-size: 0.8rem; color: #475569;">
            🖱️ Kéo chuột để xoay • Scroll để zoom
        </p>
    </div>
    
    <div id="controls">
        <button class="active" onclick="showShape('box')">Hình hộp</button>
        <button onclick="showShape('pyramid')">Chóp tứ giác</button>
        <button onclick="showShape('prism')">Lăng trụ tam giác</button>
        <button onclick="showShape('cylinder')">Hình trụ</button>
        <button onclick="showShape('cone')">Hình nón</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script>
        // ===== SCENE SETUP =====
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f172a);
        
        const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 1000);
        camera.position.set(8, 6, 10);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);
        
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.08;
        controls.target.set(2, 2.5, 1.5);
        
        // Lights
        scene.add(new THREE.AmbientLight(0x404060, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
        dirLight.position.set(8, 12, 10);
        scene.add(dirLight);
        const backLight = new THREE.DirectionalLight(0x38bdf8, 0.3);
        backLight.position.set(-5, 3, -5);
        scene.add(backLight);

        // Grid
        const grid = new THREE.GridHelper(14, 14, 0x334155, 0x1e293b);
        grid.position.y = -0.01;
        scene.add(grid);
        
        // Axes
        const axes = new THREE.AxesHelper(2);
        scene.add(axes);

        // ===== UTILITY FUNCTIONS =====
        let currentGroup = null;

        function clearShape() {
            if (currentGroup) {
                scene.remove(currentGroup);
                currentGroup = null;
            }
        }

        function createEdge(v1, v2, color = 0x94a3b8, lineWidth = 1) {
            const geo = new THREE.BufferGeometry().setFromPoints([
                new THREE.Vector3(...v1), new THREE.Vector3(...v2)
            ]);
            return new THREE.Line(geo, new THREE.LineBasicMaterial({ color }));
        }

        function createHighlightEdge(v1, v2, color = 0xef4444) {
            const p1 = new THREE.Vector3(...v1);
            const p2 = new THREE.Vector3(...v2);
            const dir = new THREE.Vector3().subVectors(p2, p1);
            const len = dir.length();
            dir.normalize();
            
            const geo = new THREE.CylinderGeometry(0.03, 0.03, len, 8);
            geo.rotateX(Math.PI / 2);
            geo.translate(0, 0, len / 2);
            
            const mat = new THREE.MeshPhongMaterial({ color, emissive: color, emissiveIntensity: 0.4 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.copy(p1);
            mesh.lookAt(p2);
            return mesh;
        }

        function createFace(vertices, color = 0x38bdf8, opacity = 0.2) {
            const positions = [];
            for (let i = 1; i < vertices.length - 1; i++) {
                positions.push(...vertices[0], ...vertices[i], ...vertices[i+1]);
            }
            const geo = new THREE.BufferGeometry();
            geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            geo.computeVertexNormals();
            return new THREE.Mesh(geo, new THREE.MeshPhongMaterial({
                color, transparent: true, opacity, side: THREE.DoubleSide, flatShading: true
            }));
        }

        function createLabel(text, position, color = '#fbbf24', scale = 0.7) {
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 128; canvas.height = 64;
            ctx.font = 'bold 44px Arial';
            ctx.fillStyle = color;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, 64, 32);
            const tex = new THREE.CanvasTexture(canvas);
            const mat = new THREE.SpriteMaterial({ map: tex });
            const sprite = new THREE.Sprite(mat);
            sprite.position.set(...position);
            sprite.scale.set(scale, scale * 0.5, 1);
            return sprite;
        }

        function createVertex(position, color = 0xfbbf24, size = 0.08) {
            const geo = new THREE.SphereGeometry(size, 16, 16);
            const mat = new THREE.MeshStandardMaterial({ color, metalness: 0.5, roughness: 0.3 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(...position);
            return mesh;
        }

        // ===== SHAPES =====
        
        function buildBox() {
            const group = new THREE.Group();
            const a = 4, b = 3, c = 5;
            const V = [
                [0,0,0],[a,0,0],[a,b,0],[0,b,0],
                [0,0,c],[a,0,c],[a,b,c],[0,b,c]
            ];
            const names = ['A','B','C','D',"A'","B'","C'","D'"];
            
            // Faces
            group.add(createFace([V[0],V[1],V[2],V[3]], 0x38bdf8, 0.12)); // bottom
            group.add(createFace([V[4],V[5],V[6],V[7]], 0xf59e0b, 0.12)); // top
            group.add(createFace([V[0],V[1],V[5],V[4]], 0xa78bfa, 0.08));
            group.add(createFace([V[1],V[2],V[6],V[5]], 0xa78bfa, 0.08));
            group.add(createFace([V[2],V[3],V[7],V[6]], 0xa78bfa, 0.08));
            group.add(createFace([V[3],V[0],V[4],V[7]], 0xa78bfa, 0.08));
            
            // Edges
            [[0,1],[1,2],[2,3],[3,0]].forEach(([i,j]) => group.add(createEdge(V[i],V[j], 0x38bdf8)));
            [[4,5],[5,6],[6,7],[7,4]].forEach(([i,j]) => group.add(createEdge(V[i],V[j], 0xf59e0b)));
            [[0,4],[1,5],[2,6],[3,7]].forEach(([i,j]) => group.add(createEdge(V[i],V[j], 0x64748b)));
            
            // Diagonal AC'
            group.add(createHighlightEdge(V[0], V[6], 0xef4444));
            
            // Vertices & Labels
            V.forEach((v, i) => {
                group.add(createVertex(v));
                const offset = [0.3, 0.3, 0.3];
                if (i < 4) offset[2] = -0.3;
                group.add(createLabel(names[i], [v[0]+offset[0]*(i%2?0.5:-0.5), v[1]+offset[1]*(i>=2&&i<=5?0.5:-0.5), v[2]+offset[2]]));
            });
            
            // Info
            const diag = Math.sqrt(a*a + b*b + c*c);
            document.getElementById('diag-val').textContent = `√(${a}²+${b}²+${c}²) = ${diag.toFixed(2)}`;
            document.getElementById('vol-val').textContent = `${a}×${b}×${c} = ${a*b*c}`;
            document.getElementById('area-val').textContent = `2(${a*b}+${b*c}+${a*c}) = ${2*(a*b+b*c+a*c)}`;
            
            document.querySelector('#info h2').textContent = '🎲 Hình hộp chữ nhật';
            document.querySelector('#info p').textContent = `ABCD.A'B'C'D' với a=${a}, b=${b}, c=${c}`;
            
            return group;
        }

        function buildPyramid() {
            const group = new THREE.Group();
            const a = 4, h = 5;
            const V = [[0,0,0],[a,0,0],[a,a,0],[0,a,0],[a/2,a/2,h]];
            const names = ['A','B','C','D','S'];
            
            group.add(createFace([V[0],V[1],V[2],V[3]], 0x38bdf8, 0.12));
            [[4,0,1],[4,1,2],[4,2,3],[4,3,0]].forEach(f => 
                group.add(createFace(f.map(i=>V[i]), 0xf59e0b, 0.1)));
            
            [[0,1],[1,2],[2,3],[3,0]].forEach(([i,j]) => group.add(createEdge(V[i],V[j],0x38bdf8)));
            [[4,0],[4,1],[4,2],[4,3]].forEach(([i,j]) => group.add(createEdge(V[i],V[j],0xf59e0b)));
            
            // SH - đường cao
            group.add(createHighlightEdge([a/2,a/2,0],[a/2,a/2,h], 0xef4444));
            group.add(createEdge([0,0,0],[a,a,0], 0x475569)); // AC diagonal
            group.add(createEdge([a,0,0],[0,a,0], 0x475569)); // BD diagonal
            
            V.forEach((v,i) => {
                group.add(createVertex(v, i===4 ? 0xef4444 : 0xfbbf24));
                group.add(createLabel(names[i], [v[0]+(i<2?-0.4:0.4), v[1]+(i>=2&&i<4?0.4:-0.4), v[2]+(i===4?0.4:-0.3)]));
            });
            group.add(createVertex([a/2,a/2,0], 0x10b981, 0.06));
            group.add(createLabel('H', [a/2+0.3, a/2+0.3, -0.3], '#10b981'));
            
            document.querySelector('#info h2').textContent = '🔺 Hình chóp tứ giác đều';
            document.querySelector('#info p').textContent = `S.ABCD, đáy vuông cạnh a=${a}, chiều cao h=${h}`;
            document.getElementById('diag-val').textContent = `SA = √(a²/2+h²) = ${Math.sqrt(a*a/2+h*h).toFixed(2)}`;
            document.getElementById('vol-val').textContent = `⅓·${a}²·${h} = ${(a*a*h/3).toFixed(1)}`;
            document.getElementById('area-val').textContent = `${a*a} + 4·½·${a}·l`;
            
            return group;
        }

        function buildPrism() {
            const group = new THREE.Group();
            const a = 4, h = 5;
            const h3 = a * Math.sqrt(3) / 2;
            const V = [[0,0,0],[a,0,0],[a/2,h3,0],[0,0,h],[a,0,h],[a/2,h3,h]];
            const names = ['A','B','C',"A'","B'","C'"];
            
            group.add(createFace([V[0],V[1],V[2]], 0x38bdf8, 0.12));
            group.add(createFace([V[3],V[4],V[5]], 0xf59e0b, 0.12));
            [[0,1,4,3],[1,2,5,4],[2,0,3,5]].forEach(f => 
                group.add(createFace(f.map(i=>V[i]), 0xa78bfa, 0.08)));
            
            [[0,1],[1,2],[2,0]].forEach(([i,j]) => group.add(createEdge(V[i],V[j],0x38bdf8)));
            [[3,4],[4,5],[5,3]].forEach(([i,j]) => group.add(createEdge(V[i],V[j],0xf59e0b)));
            [[0,3],[1,4],[2,5]].forEach(([i,j]) => group.add(createEdge(V[i],V[j],0x64748b)));
            
            V.forEach((v,i) => {
                group.add(createVertex(v));
                group.add(createLabel(names[i], [v[0]+(i%3===0?-0.4:i%3===1?0.4:0), v[1]+(i%3===2?0.4:-0.4), v[2]+(i>=3?0.4:-0.3)]));
            });
            
            document.querySelector('#info h2').textContent = '📐 Lăng trụ tam giác đều';
            document.querySelector('#info p').textContent = `ABC.A'B'C', đáy đều cạnh a=${a}, chiều cao h=${h}`;
            const sBase = a*a*Math.sqrt(3)/4;
            document.getElementById('diag-val').textContent = `AA' = h = ${h}`;
            document.getElementById('vol-val').textContent = `S·h = ${(sBase*h).toFixed(1)}`;
            document.getElementById('area-val').textContent = `2·${sBase.toFixed(1)} + 3·${a*h}`;
            
            return group;
        }

        function buildCylinder() {
            const group = new THREE.Group();
            const R = 2, h = 5;
            
            const geo = new THREE.CylinderGeometry(R, R, h, 48, 1, false);
            const mat = new THREE.MeshPhongMaterial({ color: 0x38bdf8, transparent: true, opacity: 0.2, side: THREE.DoubleSide });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(2, h/2, 1.5);
            group.add(mesh);
            
            const wireGeo = new THREE.CylinderGeometry(R, R, h, 48, 1, false);
            const wireframe = new THREE.LineSegments(
                new THREE.EdgesGeometry(wireGeo), 
                new THREE.LineBasicMaterial({ color: 0x38bdf8, linewidth: 1 })
            );
            wireframe.position.copy(mesh.position);
            group.add(wireframe);
            
            // Trục
            group.add(createHighlightEdge([2,0,1.5],[2,h,1.5], 0xef4444));
            group.add(createLabel('O', [2.3, -0.3, 1.8], '#fbbf24'));
            group.add(createLabel("O'", [2.3, h+0.3, 1.8], '#fbbf24'));
            group.add(createLabel('R', [2+R+0.3, 0, 1.5], '#38bdf8'));
            group.add(createEdge([2,0,1.5],[2+R,0,1.5], 0x38bdf8));
            
            document.querySelector('#info h2').textContent = '🫙 Hình trụ';
            document.querySelector('#info p').textContent = `Bán kính R=${R}, chiều cao h=${h}`;
            document.getElementById('diag-val').textContent = `l = √(4R²+h²) = ${Math.sqrt(4*R*R+h*h).toFixed(2)}`;
            document.getElementById('vol-val').textContent = `πR²h = ${(Math.PI*R*R*h).toFixed(1)}`;
            document.getElementById('area-val').textContent = `2πR(R+h) = ${(2*Math.PI*R*(R+h)).toFixed(1)}`;
            
            return group;
        }

        function buildCone() {
            const group = new THREE.Group();
            const R = 2.5, h = 5;
            
            const geo = new THREE.ConeGeometry(R, h, 48, 1, false);
            const mat = new THREE.MeshPhongMaterial({ color: 0xf59e0b, transparent: true, opacity: 0.2, side: THREE.DoubleSide });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set(2, h/2, 1.5);
            group.add(mesh);
            
            const wireframe = new THREE.LineSegments(
                new THREE.EdgesGeometry(geo),
                new THREE.LineBasicMaterial({ color: 0xf59e0b })
            );
            wireframe.position.copy(mesh.position);
            group.add(wireframe);
            
            group.add(createHighlightEdge([2,0,1.5],[2,h,1.5], 0xef4444));
            group.add(createLabel('O', [2.3, -0.3, 1.8], '#fbbf24'));
            group.add(createLabel('S', [2.3, h+0.3, 1.8], '#ef4444'));
            
            const l = Math.sqrt(R*R + h*h);
            document.querySelector('#info h2').textContent = '🔺 Hình nón';
            document.querySelector('#info p').textContent = `Bán kính R=${R}, chiều cao h=${h}`;
            document.getElementById('diag-val').textContent = `l = √(R²+h²) = ${l.toFixed(2)}`;
            document.getElementById('vol-val').textContent = `⅓πR²h = ${(Math.PI*R*R*h/3).toFixed(1)}`;
            document.getElementById('area-val').textContent = `πR(R+l) = ${(Math.PI*R*(R+l)).toFixed(1)}`;
            
            return group;
        }

        // ===== SHAPE SWITCHING =====
        function showShape(type) {
            clearShape();
            document.querySelectorAll('#controls button').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            
            switch(type) {
                case 'box': currentGroup = buildBox(); break;
                case 'pyramid': currentGroup = buildPyramid(); break;
                case 'prism': currentGroup = buildPrism(); break;
                case 'cylinder': currentGroup = buildCylinder(); break;
                case 'cone': currentGroup = buildCone(); break;
            }
            if (currentGroup) scene.add(currentGroup);
        }

        // Init
        showShape('box');

        // Animation
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
