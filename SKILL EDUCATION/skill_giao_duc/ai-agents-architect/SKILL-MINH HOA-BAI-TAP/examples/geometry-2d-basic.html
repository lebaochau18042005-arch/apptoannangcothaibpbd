<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tam giác vuông - Đường cao</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
    <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0f172a; color: #e2e8f0;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 24px;
        }
        h1 { 
            font-size: 1.4rem; margin-bottom: 6px; color: #38bdf8;
            font-weight: 600; letter-spacing: -0.02em;
        }
        .subtitle { color: #94a3b8; font-size: 0.9rem; margin-bottom: 16px; }
        .jxgbox { 
            border-radius: 14px; 
            box-shadow: 0 8px 40px rgba(0,0,0,0.5), 0 0 0 1px rgba(56,189,248,0.1);
            background: #1e293b !important;
        }
        .info-panel {
            margin-top: 20px; padding: 20px 28px;
            background: #1e293b; border-radius: 12px;
            font-size: 0.92rem; max-width: 700px; width: 100%;
            border: 1px solid #334155;
            line-height: 1.8;
        }
        .info-panel .row { display: flex; justify-content: space-between; gap: 20px; }
        .info-panel .label { color: #94a3b8; }
        .info-panel .value { color: #38bdf8; font-weight: 600; font-family: 'Courier New', monospace; }
        .info-panel .highlight { color: #ef4444; }
        .info-panel h3 { color: #f59e0b; font-size: 1rem; margin-bottom: 10px; }
        .badge {
            display: inline-block; padding: 2px 10px; border-radius: 20px;
            font-size: 0.78rem; font-weight: 600;
        }
        .badge-blue { background: #38bdf820; color: #38bdf8; }
        .badge-red { background: #ef444420; color: #ef4444; }
    </style>
</head>
<body>
    <h1>📐 Tam giác vuông - Đường cao AH</h1>
    <p class="subtitle">Cho △ABC vuông tại A, AB = 3, AC = 4. Vẽ đường cao AH.</p>
    
    <div id="jxgbox" class="jxgbox" style="width:660px; height:520px;"></div>
    
    <div class="info-panel">
        <h3>📊 Các đại lượng</h3>
        <div class="row">
            <div><span class="label">AB = </span><span class="value">3</span></div>
            <div><span class="label">AC = </span><span class="value">4</span></div>
            <div><span class="label">BC = </span><span class="value" id="bc-val">5</span></div>
        </div>
        <div class="row" style="margin-top: 8px;">
            <div><span class="label">AH = </span><span class="value highlight" id="ah-val">2.40</span> <span class="badge badge-red">đường cao</span></div>
            <div><span class="label">BH = </span><span class="value" id="bh-val">1.80</span></div>
            <div><span class="label">HC = </span><span class="value" id="hc-val">3.20</span></div>
        </div>
        <p style="margin-top: 12px; color: #64748b; font-size: 0.82rem;">
            💡 Hệ thức: AH² = BH · HC &nbsp;|&nbsp; AB² = BH · BC &nbsp;|&nbsp; AC² = HC · BC
        </p>
    </div>

    <script>
        const board = JXG.JSXGraph.initBoard('jxgbox', {
            boundingbox: [-1.2, 5.5, 6, -1.5],
            axis: false, grid: false,
            showCopyright: false, showNavigation: true,
            keepAspectRatio: true
        });

        // === STYLE ===
        const ptStyle = { size: 5, strokeColor: '#f59e0b', fillColor: '#fbbf24', fixed: true };
        const lblStyle = { fontSize: 17, cssClass: '', highlightCssClass: '' };

        // === ĐIỂM ===
        const A = board.create('point', [0, 0], { 
            name: 'A', ...ptStyle, 
            label: { ...lblStyle, offset: [-18, -18], color: '#fbbf24' }
        });
        const B = board.create('point', [3, 0], { 
            name: 'B', ...ptStyle,
            label: { ...lblStyle, offset: [8, -18], color: '#fbbf24' }
        });
        const C = board.create('point', [0, 4], { 
            name: 'C', ...ptStyle,
            label: { ...lblStyle, offset: [-18, 8], color: '#fbbf24' }
        });

        // === TAM GIÁC ===
        board.create('polygon', [A, B, C], {
            fillColor: '#38bdf8', fillOpacity: 0.06,
            borders: { strokeColor: '#38bdf8', strokeWidth: 2.5 },
            withLines: true, hasInnerPoints: false, withLabel: false
        });

        // === GÓC VUÔNG TẠI A ===
        board.create('angle', [B, A, C], {
            type: 'square', radius: 0.35,
            strokeColor: '#f472b6', strokeWidth: 2,
            fillColor: '#f472b640'
        });

        // === ĐƯỜNG CAO AH ===
        const lineBC = board.create('line', [B, C], { visible: false });
        const H = board.create('perpendicularpoint', [A, lineBC], {
            name: 'H', size: 5,
            strokeColor: '#ef4444', fillColor: '#ef4444',
            label: { ...lblStyle, offset: [10, -15], color: '#ef4444' }
        });
        board.create('segment', [A, H], {
            strokeColor: '#ef4444', strokeWidth: 2.5, dash: 3,
            name: 'AH'
        });

        // === GÓC VUÔNG TẠI H ===
        board.create('angle', [A, H, B], {
            type: 'square', radius: 0.28,
            strokeColor: '#10b981', strokeWidth: 2,
            fillColor: '#10b98140'
        });

        // === NHÃN CẠNH ===
        board.create('text', [1.5, -0.45, 'AB = 3'], {
            fontSize: 13, color: '#94a3b8', anchorX: 'middle'
        });
        board.create('text', [-0.7, 2, 'AC = 4'], {
            fontSize: 13, color: '#94a3b8', anchorX: 'middle'
        });
        board.create('text', [2.0, 2.6, 'BC = 5'], {
            fontSize: 13, color: '#64748b', anchorX: 'middle'
        });
        
        // === Đường kéo dài nhẹ ===
        board.create('segment', [B, C], {
            strokeColor: '#38bdf8', strokeWidth: 2.5, 
            withLabel: false
        });

        // === CẬP NHẬT PANEL ===
        const ah = A.Dist(H);
        const bh = B.Dist(H);
        const hc = H.Dist(C);
        document.getElementById('ah-val').textContent = ah.toFixed(2);
        document.getElementById('bh-val').textContent = bh.toFixed(2);
        document.getElementById('hc-val').textContent = hc.toFixed(2);
    </script>
</body>
</html>
